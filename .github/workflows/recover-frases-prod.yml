name: Recover Frases Prod Manual

on:
  workflow_dispatch:

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Copy recovery script to VPS
        run: |
          scp scripts/recover_frases_prod.py ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/recover_frases_prod.py

      - name: Recover frases on production VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -euo pipefail
            APP_DIR="/var/www/fortcordis-v2"
            cd "$APP_DIR"
            python3 /tmp/recover_frases_prod.py "$APP_DIR"
            rm -f /tmp/recover_frases_prod.py
            sudo systemctl restart fortcordis-backend
            echo "Backend reiniciado com sucesso"
          EOF

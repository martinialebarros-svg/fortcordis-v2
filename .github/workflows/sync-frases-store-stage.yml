name: Sync Frases Store on Stage

on:
  workflow_dispatch:
    inputs:
      apply:
        description: Apply seed and rewrite JSON mirror
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  sync-frases-store-stage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (stage)
        uses: actions/checkout@v4
        with:
          ref: stage

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Run sync_frases_store.py on stage
        env:
          APPLY: ${{ github.event.inputs.apply }}
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "export APPLY='${APPLY}'; bash -s" <<'EOF'
            set -euo pipefail
            STAGE_DIR="/var/www/fortcordis-stage"

            cd "$STAGE_DIR/backend"
            source venv/bin/activate
            if [ -f .env ]; then
              set -a
              source .env
              set +a
            fi

            if [ "${APPLY}" = "true" ]; then
              python3 sync_frases_store.py --apply
            else
              python3 sync_frases_store.py
            fi
          EOF

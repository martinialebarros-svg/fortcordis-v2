name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

    - name: Add VPS to known hosts
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to VPS
      run: |
        ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          set -euo pipefail
          cd /var/www/fortcordis-v2

          echo "Creating backup..."
          tar -czf backup_$(date +%Y%m%d_%H%M%S).tar.gz backend frontend 2>/dev/null || true

          echo "Preserving runtime files (frases/db)..."
          RUNTIME_BACKUP_DIR="/tmp/fortcordis_runtime_backup"
          rm -rf "$RUNTIME_BACKUP_DIR"
          mkdir -p "$RUNTIME_BACKUP_DIR/backend/data"
          [ -f backend/data/frases.json ] && cp backend/data/frases.json "$RUNTIME_BACKUP_DIR/backend/data/frases.json" || true
          [ -f backend/data/patologias.json ] && cp backend/data/patologias.json "$RUNTIME_BACKUP_DIR/backend/data/patologias.json" || true
          [ -f backend/fortcordis.db ] && cp backend/fortcordis.db "$RUNTIME_BACKUP_DIR/backend/fortcordis.db" || true

          echo "Updating code..."
          git fetch origin
          git reset --hard origin/main

          echo "Restoring runtime files (frases/db)..."
          mkdir -p backend/data
          [ -f "$RUNTIME_BACKUP_DIR/backend/data/frases.json" ] && cp "$RUNTIME_BACKUP_DIR/backend/data/frases.json" backend/data/frases.json || true
          [ -f "$RUNTIME_BACKUP_DIR/backend/data/patologias.json" ] && cp "$RUNTIME_BACKUP_DIR/backend/data/patologias.json" backend/data/patologias.json || true
          [ -f "$RUNTIME_BACKUP_DIR/backend/fortcordis.db" ] && cp "$RUNTIME_BACKUP_DIR/backend/fortcordis.db" backend/fortcordis.db || true
          rm -rf "$RUNTIME_BACKUP_DIR" || true

          echo "Deploy backend..."
          cd backend
          source venv/bin/activate 2>/dev/null || python3 -m venv venv && source venv/bin/activate
          pip install -r requirements.txt
          if [ -f .env ]; then
            set -a
            source .env
            set +a
          fi
          python3 setup_database.py || echo "setup_database.py failed, check logs"

          if systemctl restart fortcordis-backend >/dev/null 2>&1; then
            echo "Backend restart via systemctl"
          elif sudo -n systemctl restart fortcordis-backend >/dev/null 2>&1; then
            echo "Backend restart via sudo -n"
          else
            echo "Backend restart via systemctl indisponivel; iniciando uvicorn manual"
            pkill -f "uvicorn app.main:app --host 0.0.0.0 --port 8000" || true
            nohup ./venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 > ../backend_manual.out 2>&1 &
          fi

          BACKEND_OK=0
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              BACKEND_OK=1
              break
            fi
            sleep 2
          done

          if [ "$BACKEND_OK" -ne 1 ]; then
            echo "Backend local health check failed"
            ss -lntp | egrep ':8000|:3000' || true
            ps -ef | egrep 'uvicorn|fortcordis-backend' | grep -v grep || true
            sudo -n systemctl status fortcordis-backend --no-pager -l || true
            sudo -n journalctl -u fortcordis-backend -n 200 --no-pager || true
            tail -n 200 ../backend_manual.out || true
            exit 1
          fi

          curl -sS -i http://127.0.0.1:8000/health || true
          cd ..

          echo "Deploy frontend..."
          cd frontend
          npm install
          API_BACKEND_URL=http://127.0.0.1:8000 npm run build

          if systemctl restart fortcordis-frontend >/dev/null 2>&1; then
            echo "Frontend restart via systemctl"
          elif sudo -n systemctl restart fortcordis-frontend >/dev/null 2>&1; then
            echo "Frontend restart via sudo -n"
          else
            echo "Frontend restart via systemctl indisponivel; iniciando next start manual"
            pkill -f "next-server" || true
            nohup npm run start > ../frontend_manual.out 2>&1 &
          fi

          FRONTEND_OK=0
          for i in $(seq 1 25); do
            if curl -fsSI http://127.0.0.1:3000 >/dev/null; then
              FRONTEND_OK=1
              break
            fi
            sleep 2
          done

          if [ "$FRONTEND_OK" -ne 1 ]; then
            echo "Frontend local health check failed"
            ss -lntp | egrep ':3000|:8000' || true
            ps -ef | egrep 'next|fortcordis-frontend' | grep -v grep || true
            sudo -n systemctl status fortcordis-frontend --no-pager -l || true
            sudo -n journalctl -u fortcordis-frontend -n 200 --no-pager || true
            tail -n 200 ../frontend_manual.out || true
            exit 1
          fi

          curl -sS -I http://127.0.0.1:3000 || true
          cd ..

          echo "Deploy finished"
        EOF

name: Fix Database (Manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment (stage or production)"
        required: true
        default: stage
        type: choice
        options:
          - stage
          - production

jobs:
  fix-database:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.environment == 'stage' && 'stage' || 'main' }}

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Fix Database
        run: |
          if [ "${{ inputs.environment }}" == "stage" ]; then
            PROJECT_DIR="/var/www/fortcordis-stage"
            SERVICE_NAME="fortcordis-stage-backend"
            BRANCH="stage"
          else
            PROJECT_DIR="/var/www/fortcordis-v2"
            SERVICE_NAME="fortcordis-backend"
            BRANCH="main"
          fi

          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << EOF
            set -euo pipefail
            echo "Fixing database on: ${{ inputs.environment }}"
            cd $PROJECT_DIR

            echo "Updating code..."
            git fetch origin
            git reset --hard origin/$BRANCH

            echo "Running diagnostics..."
            cd backend
            source venv/bin/activate
            if [ -f .env ]; then
              set -a
              source .env
              set +a
            fi
            python3 diagnostico_vps.py || true

            echo "Running setup and migrations..."
            python3 setup_database.py

            echo "Restarting backend service..."
            sudo systemctl restart $SERVICE_NAME

            echo "Checking service status..."
            sleep 2
            sudo systemctl is-active $SERVICE_NAME
          EOF

      - name: API Probe
        run: |
          if [ "${{ inputs.environment }}" == "stage" ]; then
            URL="https://stage.fortcordis.com.br/api/v1/auth/login"
          else
            URL="https://fortcordis.com.br/api/v1/auth/login"
          fi

          echo "Probing API endpoint: $URL"
          code=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          echo "HTTP status: $code"
          if [ "$code" != "405" ] && [ "$code" != "200" ] && [ "$code" != "401" ]; then
            echo "Unexpected status code from API probe"
            exit 1
          fi
